<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Question for You 😌</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffe6eb;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 35px;
            margin-bottom: 30px;
        }

        .buttons {
            position: relative;
            width: 400px;
            height: 200px;
        }

        button {
            padding: 25px 35px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        #yesBtn {
            background: #4CAF50;
            color: white;
            position: absolute;
            left: 40px;
            top: 0;
        }

        #noBtn {
            background: #ff4d4d;
            color: white;
            position: absolute;
            left: 240px;
            top: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Navya ... Do you think you look beautiful? ✨</h1>

        <div class="buttons">
            <button id="yesBtn">Yes 😌</button>
            <button id="noBtn">No 😏</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById("yesBtn");

        function moveButton() {
            const maxX = window.innerWidth - yesBtn.offsetWidth;
            const maxY = window.innerHeight - yesBtn.offsetHeight;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            yesBtn.style.left = randomX + "px";
            yesBtn.style.top = randomY + "px";
            yesBtn.style.position = "fixed";
        }

        // 🖥️ Laptop hover
        yesBtn.addEventListener("mouseover", moveButton);

        // 📱 Mobile touch
        yesBtn.addEventListener("touchstart", (e) => {
            e.preventDefault();
            moveButton();
        });

        // NO button click
        document.getElementById("noBtn")
        .addEventListener("click", () => {
            alert("I knew it  😏 you're not beautiful 😂");
        });
    </script>

</body>
</html>
