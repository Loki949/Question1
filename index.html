<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just One Question 😌</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffe6f0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 35px;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            padding: 15px 35px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        #yesBtn {
            background: #4CAF50;
            color: white;
            position: fixed;
        }

        #noBtn {
            background: #ff4d4d;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Navya .... Do you think you look beautiful? ✨</h1>

        <div class="buttons">
            <button id="yesBtn">Yes 😌</button>
            <button id="noBtn">No 🙃</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById("noBtn");

        noBtn.addEventListener("mouseover", () => {
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";
            noBtn.style.position = "fixed";
        });

    alert("I knew it  😏 you're not beautiful 😂");
});
    </script>

</body>

</html>
