<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just One Question 😌</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffe6f0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 35px;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            padding: 15px 35px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        #yesBtn {
            background: #4CAF50;
            color: white;
            position: fixed;
        }

        #noBtn {
            background: #ff4d4d;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Do you think you look beautiful? ✨</h1>

        <div class="buttons">
            <button id="yesBtn">Yes 😌</button>
            <button id="noBtn">No 🙃</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById("yesBtn");

        // YES button follows cursor
        document.addEventListener("mousemove", (e) => {
            yesBtn.style.left = (e.clientX + 15) + "px";
            yesBtn.style.top = (e.clientY + 15) + "px";
        });

        // Mobile touch follow
        document.addEventListener("touchmove", (e) => {
            const touch = e.touches[0];

            yesBtn.style.left = (touch.clientX + 15) + "px";
            yesBtn.style.top = (touch.clientY + 15) + "px";
        });

        // NO button clicked
        document.getElementById("noBtn")
        .addEventListener("click", () => {
            alert("Nice try 😂 but you look pretty though ✨");
        });
    </script>

</body>
</html>
